name: GSC Sheets Sync

on:
  schedule:
    - cron: "0 6 1,15 * *" # 1st and 15th of every month at 06:00 UTC
  workflow_dispatch:

concurrency:
  group: gsc-sync-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  export:
    name: ${{ matrix.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        include:
          - name: blog.aspose.com
            script: GSC-aspose.com.py
            repo: Aspose/aspose-blog
          - name: blog.aspose.cloud
            script: GSC-aspose.cloud.py
            repo: aspose-cloud/aspose-cloud-blog
          - name: blog.conholdate.com
            script: GSC-conholdate.com.py
            repo: conholdate/conholdate-blog
          - name: blog.conholdate.cloud
            script: GSC-conholdate.cloud.py
            repo: conholdate-cloud/blog.conholdate.cloud
          - name: blog.groupdocs.com
            script: GSC-groupdocs.com.py
            repo: groupdocs/groupdocs-blog
          - name: blog.groupdocs.cloud
            script: GSC-groupdocs.cloud.py
            repo: groupdocs-cloud/groupdocs-cloud-blog

    steps:
      # Checkout THIS repo (where workflow exists)
      - name: Checkout current repository
        uses: actions/checkout@v4

      # Checkout target blog repo (private) using PAT
      - name: Checkout blog content repository
        uses: actions/checkout@v4
        with:
          repository: ${{ matrix.repo }}
          token: ${{ secrets.BLOG_REPOS_TOKEN }}
          path: blog-content

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt pandas searchconsole google-auth google-auth-oauthlib google-auth-httplib2

      - name: Write Google OAuth files
        env:
          GSC_CLIENT_SECRET_JSON: ${{ secrets.GSC_CLIENT_SECRET_JSON }}
          GSC_CREDENTIALS_JSON: ${{ secrets.GSC_CREDENTIALS_JSON }}
        run: |
          [ -n "$GSC_CLIENT_SECRET_JSON" ] || { echo "Set GSC_CLIENT_SECRET_JSON secret"; exit 1; }
          printf '%s' "$GSC_CLIENT_SECRET_JSON" > client_secret.json
          if [ -n "$GSC_CREDENTIALS_JSON" ]; then
            printf '%s' "$GSC_CREDENTIALS_JSON" > credentials.json
          fi

      - name: Run ${{ matrix.name }} export
        env:
          BLOG_CONTENT_ROOT: blog-content
        run: python ${{ matrix.script }}

      - name: Commit CSV outputs
        run: |
          git config user.name "Optimizer Agent"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add -f csv
          git status --short

          if git diff --cached --quiet; then
            echo "No CSV changes to commit."
            exit 0
          fi

          git commit -m "Update GSC CSVs for ${{ matrix.name }}"

          # Handle rebase conflicts automatically for csv files
          if ! git pull --rebase origin "${GITHUB_REF_NAME}"; then
            echo "Rebase conflict detected. Auto-resolving csv/* ..."
            while [ -d .git/rebase-merge ] || [ -d .git/rebase-apply ]; do
              conflicted="$(git diff --name-only --diff-filter=U || true)"

              if [ -z "${conflicted}" ]; then
                GIT_EDITOR=true git rebase --continue || true
                continue
              fi

              if echo "${conflicted}" | grep -qv '^csv/'; then
                echo "Non-CSV conflict detected:"
                echo "${conflicted}"
                git rebase --abort
                exit 1
              fi

              git checkout --theirs -- ${conflicted}
              git add ${conflicted}
              GIT_EDITOR=true git rebase --continue || true
            done
          fi

          git push origin "HEAD:${GITHUB_REF_NAME}"